<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transpList</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>

<div class="container my-3">
    <p>운송목록</p>
    <div class="row g-3 align-items-center mb-3">
        <div class="col-md-3">
            <select id="selectBox" class="form-select">
                <option>출발</option>
                <option>도착</option>
            </select>
        </div>
        <div class="col-md-3">
            <input type="date" id="startDate" class="form-control">
        </div>
        <div class="col-md-1 d-flex justify-content-center">
            <span>~</span>
        </div>
        <div class="col-md-3">
            <input type="date" id="endDate" class="form-control">
        </div>
        <div class="col-md-2">
            <button type="button" class="btn btn-success w-100">검색</button>
        </div>
    </div>

    <table class="table table-striped table-bordered mt-3">
        <thead class="table-dark">
        <tr class="text-center">
            <th>운송번호</th>
            <th>운송요청일시</th>
            <th>출발일시</th>
            <th>도착일시</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td>1</td>
            <td>2025-01-01 12:00</td>
            <td>2025-01-02 08:00</td>
            <td>2025-01-02 12:00</td>
        </tr>
        <tr>
            <td>2</td>
            <td>2025-01-03 10:00</td>
            <td>2025-01-03 14:00</td>
            <td>2025-01-03 18:00</td>
        </tr>
        <tr>
            <td>3</td>
            <td>2025-01-05 09:30</td>
            <td>2025-01-05 11:00</td>
            <td>2025-01-05 15:00</td>
        </tr>
        </tbody>
    </table>

    <div aria-label="Page navigation example">
        <ul class="pagination justify-content-center">
            <li class="page-item">
                <a class="page-link" href="#" aria-label="First">
                    <span aria-hidden="true">&laquo;</span>
                </a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#" aria-label="Previous">
                    <span aria-hidden="true">&lsaquo;</span>
                </a>
            </li>
            <li class="page-item active"><a class="page-link" href="#">1</a></li>
            <li class="page-item"><a class="page-link" href="#">2</a></li>
            <li class="page-item"><a class="page-link" href="#">3</a></li>
            <li class="page-item">
                <a class="page-link" href="#" aria-label="Next">
                    <span aria-hidden="true">&rsaquo;</span>
                </a>
            </li>
            <li class="page-item">
                <a class="page-link" href="#" aria-label="Last">
                    <span aria-hidden="true">&raquo;</span>
                </a>
            </li>
        </ul>
    </div>
</div>

</body>
</html>
