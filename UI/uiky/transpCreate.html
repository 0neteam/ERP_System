<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>transpCreate</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Latest compiled JavaScript -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</head>
<body>

    <div class="container my-3">
    <p>입출고 리스트</p>
    <table class="table table-striped table-bordered">
        <thead class="table-dark">
        <tr class="text-center">
            <th><input type="checkbox" id="checkAll"> 전체</th>
            <th>출고번호</th>
            <th>발주번호</th>
            <th>품목코드</th>
            <th>품목명</th>
            <th>수량</th>
        </tr>
        </thead>
        <tbody>
        <tr>
            <td><input type="checkbox"></td>
            <td>출고번호1</td>
            <td>발주번호1</td>
            <td>품목코드1</td>
            <td>품목명1</td>
            <td>10</td>
        </tr>
        <tr>
            <td><input type="checkbox"></td>
            <td>출고번호2</td>
            <td>발주번호2</td>
            <td>품목코드2</td>
            <td>품목명2</td>
            <td>5</td>
        </tr>
        </tbody>
    </table>

    <div class="container my-3 d-flex gap-2 justify-content-end">
        <button type="button" class="btn btn-success" data-bs-toggle="modal" data-bs-target="#productModal">운송기사 배정</button>
        <button type="button" class="btn btn-success">취소</button>
    </div>
    </div>

    <!-- modal -->
    <div class="modal" id="productModal">
        <div class="modal-dialog modal-xl">
            <div class="modal-content">
                <div class="modal-header">
                </div>
                <div class="modal-body">
                    <div class="container">
                        <p>기사 배정</p>
                        <div class="mb-2">
                            <form class="form">
                                <div class="d-flex gap-2">
                                    <input type="text" class="form-control w-50">
                                    <button type="submit" class="btn btn-success">검색</button>
                                </div>
                            </form>
                        </div>
                        <div>
                            <table class="table table-striped table-bordered">
                                <thead class="table-dark">
                                <tr class="text-center">
                                    <th></th>
                                    <th>이름</th>
                                    <th>연락처</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr>
                                    <td><input type="radio"></td>
                                    <td>감자</td>
                                    <td>potato@naver.com</td>
                                </tr>
                                <tr>
                                    <td><input type="radio"></td>
                                    <td>구월</td>
                                    <td>september@gmail.com</td>
                                </tr>
                                </tbody>
                            </table>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <button type="button" class="btn btn-success">배정</button>
                            <button type="button" class="btn btn-secondary">취소</button>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                </div>
            </div>
        </div>
    </div>
    <!-- modal -->

</body>
</html>
