<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>itemCreate</title>
</head>

<body>
    <div class="container">
        <div>
            <img class="mx-auto d-block img-thumbnail mt-3" style="width: 30vh;" src="empty_img.jpg" alt="logo">

        </div>
        <div class="input-group mt-3">
            <span class="input-group-text d-flex justify-content-center text-nowrap" style="width: 100px;">품목명</span>
            <input type="text" class="form-control">
        </div>
        <div class="input-group mt-3">
            <span class="input-group-text d-flex justify-content-center text-nowrap" style="width: 100px;">단가</span>
            <input type="text" class="form-control">
        </div>
        <div class="d-flex btn-group mt-3 mb-2">
            <button type="button" class="btn btn-outline-primary" href="#!">저장</button>
            <a type="button" class="btn btn-outline-danger" href="#!">취소</a>
        </div>
    </div>
</body>

</html>
