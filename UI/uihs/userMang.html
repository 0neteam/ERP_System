<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>userMang</title>
</head>

<body>
    <div class="container mb-2">
        <div class="mb-2">
            <p>직원 관리</p>
        </div>

        <div class="row mb-2">
            <!-- 좌측 영역 -->
            <div class="col-12 col-md-3 mb-2">
                <div class="section-box d-flex flex-column justify-content-between h-100">
                    <ul class="list-group mb-3">
                        <li class="list-group-item border-1 d-flex justify-content-between align-items-center">
                            직원 A
                        </li>
                        <li class="list-group-item border-1 d-flex justify-content-between align-items-center">
                            직원 B
                        </li>
                        <li class="list-group-item border-1 d-flex justify-content-between align-items-center">
                            직원 C
                        </li>
                        <li class="list-group-item border-1 d-flex justify-content-between align-items-center">
                            직원 D
                        </li>
                    </ul>
                </div>
            </div>

            <!-- 우측 영역 -->
            <div class="col-12 col-md-9 mb-2">
                <div class="section-box d-flex flex-column justify-content-between h-100">
                    <div>
                        <div class="input-group mb-2">
                            <span class="input-group-text">사번</span>
                            <input type="text" id="no" class="form-control" placeholder="no" disabled>
                        </div>

                        <div class="mb-2">
                            <select class="form-select">
                                <option selected>부서 선택</option>
                                <option value="1">관리자</option>
                                <option value="2">창고</option>
                                <option value="3">제조</option>
                                <option value="4">운송</option>
                                <option value="5">기사</option>
                            </select>
                        </div>

                        <div class="input-group mb-2">
                            <span class="input-group-text">부서</span>
                            <input type="text" id="email" class="form-control" placeholder="제조, 창고" disabled>
                        </div>

                        <div class="input-group mb-2">
                            <span class="input-group-text">메일</span>
                            <input type="text" id="email" class="form-control" placeholder="email@email.com" disabled>
                        </div>
                        
                        <div class="input-group mb-2">
                            <span class="input-group-text">이름</span>
                            <input type="text" id="name" class="form-control" placeholder="name" disabled>
                        </div>
                    </div>

                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-success">추가</button>
                        <button type="submit" class="btn btn-success">수정</button>
                        <button type="button" class="btn btn-secondary">취소</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
