<!DOCTYPE html>
<html lang="ko">

    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
        <title>userMang</title>
        <style>
            .nav-item.dropdown:hover .dropdown-menu {
            display: block;
            }
            header.navbar {
                background-color: white !important;
            }
            header.navbar .nav-link {
                color: black !important;
            }
            .navbar {
                background-color: #001f3f !important;
            }
            .navbar .nav-link,
            .navbar .navbar-brand a{
                color: white !important;
            }
            .navbar .dropdown-menu  a{
                color: black !important;
            }
            .navbar .dropdown-menu {
                background-color: white !important;
            }
            .navbar-toggler {
                border-color: white !important;
            }
            .navbar-toggler-icon {
                filter: invert(1);
            }
            .navbar-collapse.show .dropdown-menu {
                background-color: #001f3f;
                text-align: center;
            }
            @media (max-width: 300px) {
                header.navbar .navbar-nav {
                    display: none !important;
                }
            }
        </style>
    </head>

    <body>
        <header class="navbar">
            <div class="container">
                <div class="navbar-nav d-flex flex-row flex-nowrap align-items-center ms-auto">
                    <a class="nav-item nav-link me-3" href="#!">마이페이지</a>
                    <a class="nav-item nav-link" href="#!" id="login">로그인</a>
                    <a class="nav-item nav-link" href="#!" id="logout">로그아웃</a>
                </div>
            </div>
        </header>
        
        <nav class="navbar navbar-expand-md bg-light">
            <div class="container">
                <div class="navbar-brand d-flex align-items-center">
                    <a class="me-5" href="#!">
                        <img src="/UI/temp_logo.png" alt="logo" width="120px" height="40px">
                    </a>
                </div>
        
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
        
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav nav-fill gap-3 fs-5">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-dark" data-bs-toggle="dropdown" href="#" role="button" aria-expanded="false">인사</a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">직원관리</a></li>
                                <li><a class="dropdown-item" href="#">부서관리</a></li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="#">품목관리</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="#">재고관리</a>
                        </li>
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle text-dark" data-bs-toggle="dropdown" href="#" role="button" aria-expanded="false">발주</a>
                            <ul class="dropdown-menu">
                                <li><a class="dropdown-item" href="#">발주목록</a></li>
                                <li><a class="dropdown-item" href="#">발주신청</a></li>
                            </ul>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link text-dark" href="#">운송목록</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>

        <section class="container mb-2 p-3" style="min-height: 70vh;">
            <div class="p-3">
                <h2>직원 관리</h2>
            </div>

            <div class="row mb-2">
                <!-- 좌측 영역 -->
                <div class="col-12 col-md-3 mb-2">
                    <div class="section-box d-flex flex-column justify-content-between h-100">
                        <ul class="list-group mb-3">
                            <li class="list-group-item border-1 d-flex justify-content-between align-items-center">
                                직원 A
                            </li>
                            <li class="list-group-item border-1 d-flex justify-content-between align-items-center">
                                직원 B
                            </li>
                            <li class="list-group-item border-1 d-flex justify-content-between align-items-center">
                                직원 C
                            </li>
                            <li class="list-group-item border-1 d-flex justify-content-between align-items-center">
                                직원 D
                            </li>
                        </ul>
                    </div>
                </div>

                <!-- 우측 영역 -->
                <div class="col-12 col-md-9 mb-2">
                    <div class="section-box d-flex flex-column justify-content-between h-100">
                        <div>
                            <div class="input-group mb-2">
                                <span class="input-group-text">사번</span>
                                <input type="text" id="no" class="form-control" placeholder="no" disabled>
                            </div>

                            <div class="mb-2">
                                <select class="form-select">
                                    <option selected>부서 선택</option>
                                    <option value="1">관리자</option>
                                    <option value="2">창고</option>
                                    <option value="3">제조</option>
                                    <option value="4">운송</option>
                                    <option value="5">기사</option>
                                </select>
                            </div>

                            <div class="input-group mb-2">
                                <span class="input-group-text">부서</span>
                                <input type="text" id="email" class="form-control" placeholder="제조, 창고" disabled>
                            </div>

                            <div class="input-group mb-2">
                                <span class="input-group-text">메일</span>
                                <input type="text" id="email" class="form-control" placeholder="email@email.com" disabled>
                            </div>
                            
                            <div class="input-group mb-2">
                                <span class="input-group-text">이름</span>
                                <input type="text" id="name" class="form-control" placeholder="name" disabled>
                            </div>
                        </div>

                        <div class="d-flex justify-content-end gap-2">
                            <button type="submit" class="btn btn-success">추가</button>
                            <button type="submit" class="btn btn-success">수정</button>
                            <button type="button" class="btn btn-secondary">취소</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>
        <footer class="py-2">
            <hr class="border-secondary">
            <div class="container">
                <div class="row align-items-center">
                    <div class="col-auto">
                        <a class="nav-link text-dark fw-bold" href="https://github.com/0neteam">github</a>
                    </div>
                    <div class="col text-center">
                        <p class="mb-0">Copyright © STEP THREE 2025</p>
                    </div>

                        <button class="btn btn-outline-dark dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false">

                        </button>
                        <ul class="dropdown-menu" id="dropdown">
                            <li>함효신 mail@mail.com</li>

                            <li>강승우 mail@mail.com</li>
                            <li>임지은 mail@mail.com</li>
                        </ul>
                    </div> -->

            </div>
        </footer>
    </body>
</html>
