<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>deptMang</title>
</head>

<body>
    <div class="container mb-2">
        <div class="mb-2">
            <p>부서 관리</p>
        </div>

        <div class="row mb-2">
            <!-- 좌측 영역 -->
            <div class="col-12 col-md-3 mb-2">
                <div class="section-box d-flex flex-column justify-content-between h-100">
                    <ul class="list-group mb-3">
                        <li class="list-group-item border-1 d-flex justify-content-between align-items-center">
                            창고
                        </li>
                        <li class="list-group-item border-1 d-flex justify-content-between align-items-center">
                            제조
                        </li>
                        <li class="list-group-item border-1 d-flex justify-content-between align-items-center">
                            운송
                        </li>
                        <li class="list-group-item border-1 d-flex justify-content-between align-items-center">
                            기사
                        </li>
                    </ul>
                </div>
            </div>

            <!-- 우측 영역 -->
            <div class="col-12 col-md-9 mb-2">
                <div class="section-box d-flex flex-column justify-content-between h-100">
                    <div>
                        <div class="input-group mb-2">
                            <span class="input-group-text">부서번호</span>
                            <input type="text" id="no" class="form-control" placeholder="no" disabled>
                        </div>

                        <div class="input-group mb-2">
                            <span class="input-group-text">부서명</span>
                            <input type="text" id="name" class="form-control" placeholder="name">
                        </div>

                        <div class="input-group mb-2">
                            <span class="input-group-text">생성일</span>
                            <input type="text" id="regDate" class="form-control" placeholder="regDate" disabled>
                        </div>

                        <div class="input-group mb-2">
                            <span class="input-group-text">수정일</span>
                            <input type="text" id="modDate" class="form-control" placeholder="modDate" disabled>
                        </div>

                        <div class="input-group mb-2">
                            <span class="input-group-text">사용여부</span>
                            <input type="text" id="useYN" class="form-control" placeholder="useYN" disabled>
                        </div>

                        <table class="table table-striped table-bordered">
                            <thead class="table-dark">
                                <tr>
                                    <th colspan="3">부서구성원</th>
                                </tr>
                                <tr class="text-center">
                                    <th>사번</th>
                                    <th>이름</th>
                                    <th>소속부서</th>
                                </tr>
                            </thead>
                            <tbody>
                              <tr>
                                <td>1</td>
                                <td>직원 A</td>
                                <td>창고</td>
                              </tr>
                              <tr>
                                <td>2</td>
                                <td>직원 B</td>
                                <td>제조, 운송</td>
                              </tr>
                              <tr>
                                <td>3</td>
                                <td>직원 C</td>
                                <td>기사</td>
                              </tr>
                            </tbody>
                          </table>

                    <div class="d-flex justify-content-center gap-2">
                        <button type="submit" class="btn btn-success">수정</button>
                        <button type="submit" class="btn btn-success">저장</button>
                        <button type="button" class="btn btn-secondary">삭제</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
