<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>itemCreate</title>
    <style>
        .nav-item.dropdown:hover .dropdown-menu {
          display: block;
        }
        header.navbar {
            background-color: white !important;
        }
        header.navbar .nav-link {
            color: black !important;
        }
        .navbar {
            background-color: #001f3f !important;
        }
        .navbar .nav-link,
        .navbar .navbar-brand a{
            color: white !important;
        }
        .navbar .dropdown-menu  a{
            color: black !important;
        }
        .navbar .dropdown-menu {
            background-color: white !important;
        }
        .navbar-toggler {
            border-color: white !important;
        }
        .navbar-toggler-icon {
            filter: invert(1);
        }
        .navbar-collapse.show .dropdown-menu {
            background-color: #001f3f;
            text-align: center;
        }
    </style>
</head>

<body>
    <div class="container mb-2">
        <div class="mb-2 justify-content-between">
            <p>품목 관리</p>
        </div>
        <div class="mb-2">
            <form class="form">
                <div class="d-flex gap-2 align-items-center">
                    <div class="col-md-3">
                        <select class="form-select">
                            <option value="1">품목번호</option>
                            <option value="2">품목명</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <input type="input" class="form-control">
                        <button type="submit" class="btn btn-success">검색</button>
                    </div>
                    <div class="text-end col-md-1">
                        <button type="button" class="btn btn-primary">품목 추가</button>
                    </div>
                </div>
            </form>
        </div>        
        <div>
            <table class="table table-striped table-bordered">
                <thead class="table-dark">
                    <tr class="text-center">
                        <th>품목번호</th>
                        <th>품목명</th>
                        <th>단가</th>
                        <th>제품등록일자</th>
                    </tr>
                </thead>
                <tbody>
                    <tr>
                        <td class="text-center">1</td>
                        <td>제품 A</td>
                        <td class="text-center">3,000</td>
                        <td class="text-center">2024-03-01</td>
                    </tr>
                    <tr>
                        <td class="text-center">2</td>
                        <td>제품 B</td>
                        <td class="text-center">12,000</td>
                        <td class="text-center">2024-05-01</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div>
            <ul class="pagination justify-content-center">
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="First">
                        <span aria-hidden="true">&laquo;</span>
                    </a>
                </li>
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Previous">
                        <span aria-hidden="true">&lsaquo;</span>
                    </a>
                </li>
                <li class="page-item"><a class="page-link" href="#">1</a></li>
                <li class="page-item"><a class="page-link" href="#">2</a></li>
                <li class="page-item"><a class="page-link" href="#">3</a></li>
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Next">
                        <span aria-hidden="true">&rsaquo;</span>
                    </a>
                </li>
                <li class="page-item">
                    <a class="page-link" href="#" aria-label="Last">
                        <span aria-hidden="true">&raquo;</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</body>

</html>
