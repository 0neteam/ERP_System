    <section class="container" style="min-height: 50vh;">
        <div class="row">

            <div class="col-6" style="min-width: 400px;">
                <h1 class="display-6 text-nowrap text-center">mypage</h1>
                <div>
                    <img class="mx-auto d-block rounded-circle img-thumbnail mt-3" style="width: 20vh;" src="img1.png" alt="logo">

                <div class="input-group mt-3">
                    <span class="input-group-text d-flex justify-content-center text-nowrap" style="width: 100px;">사번</span>

                </div>
                <div class="input-group mt-3">
                    <span class="input-group-text d-flex justify-content-center text-nowrap" style="width: 100px;">Email</span>
                    <input type="text" class="form-control" value="email@domain.com" readonly>
                </div>

                <!-- 수정 중일 때만 보이는 입력칸과 버튼 -->
                <div class="input-group mt-3">
                    <span class="input-group-text d-flex justify-content-center text-nowrap" style="width: 100px;">P/W</span>
                    <input id="pw" name="pw" type="password" class="form-control" placeholder="새 비밀번호">
                </div>
                <div class="input-group mt-1">
                    <span class="input-group-text d-flex justify-content-center text-nowrap" style="width: 100px;">P/W Check</span>
                    <input id="pwChk" name="pwChk" type="password" class="form-control" placeholder="새 비밀번호 확인">
                </div>
                               
                <!-- 비밀번호 input창에서 포커스 아웃되었을 때 비밀번호와 비밀번호 확인에 입력된 값이 다를 때 보이는 경고문 -->
                <div class="mt-1">
                    <div id="diffPw" name="diffPw" class="alert alert-warning" style="display: block;">
                    비밀번호를 확인해주세요.
                    </div>
                </div>

                <div class="input-group mt-3">
                    <span class="input-group-text d-flex justify-content-center text-nowrap" style="width: 100px;">이름</span>
                    <input type="text" class="form-control" value="성이름" readonly>
                </div>
                <div class="d-flex btn-group mt-3 mb-2">
                    <!-- 조회 중일 때 보이는 버튼 : 수정 -->
                    <!-- 수정 중일 때 보이는 버튼 : 저장, 취소 -->
                    <button type="button" class="btn btn-outline-primary text-nowrap w-50" href="#!">비밀번호 변경</button>
                    <button type="button" class="btn btn-outline-primary w-50" href="#!">저장</button>
                    <a type="button" class="btn btn-outline-danger w-50" href="#!">취소</a>
