    <section class="container" style="min-height: 50vh;">

                <div class="form-floating mt-3">

                </div>

                <div class="form-floating mt-3">
                    <input type="password" class="form-control" id="pw" name="pw" type="password" placeholder="Password">
                    <label for="email">Password</label>
                </div>
                <div class="d-flex mt-3">
                    <button id="loginButton" name="loginButton" type="button" class="btn btn-outline-primary flex-fill">로그인</button>
                </div>

                <!-- 로그인 버튼을 누른 뒤 아래의 경우일 경우 뜨는 경고문 -->
                <!-- 가입되지 않은 이메일로 로그인 시도한 경우 -->
                <!-- 비밀번호가 틀린 경우 -->
                <div id="loginInfoWarning" name="loginInfoWarning" class="alert alert-warning mt-3" style="display: block;">

                    </svg>
                    <strong>로그인 정보</strong>를 확인해주세요.
                </div>
                <div class="d-flex btn-group mt-3 mb-2">

                    <a type="button" class="btn btn-outline-danger" href="#!">회원가입</a>
                </div>
