server.port: 8000

spring:
  application.name: gateway
  config:
    import: optional:file:.env[.properties]
  cloud:
    gateway:
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Origin Access-Control-Allow-Methods Access-Control-Allow-Headers Access-Control-Allow-Credentials RETAIN_FIRST
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - ${CORS_ORIGIN1}
              - ${CORS_ORIGIN2}
            allow-credentials: true
            allowedHeaders: '*'
            allowedMethods:
              - PUT
              - GET
              - POST
              - PATCH
              - DELETE
      routes:
        - id: stg-service
          uri: ${ROUTE_STG_URI}
          predicates:
            - Path=/stg/**
          filters:
            - RewritePath=/stg/?(?<segment>.*), /${segment}
            - ApiFilter
        - id: mfr-service
          uri: ${ROUTE_MFR_URI}
          predicates:
            - Path=/mfr/**
          filters:
            - RewritePath=/mfr/?(?<segment>.*), /${segment}
            - ApiFilter
        - id: trs-service
          uri: ${ROUTE_TRS_URI}
          predicates:
            - Path=/trs/**
          filters:
            - RewritePath=/trs/?(?<segment>.*), /${segment}
            - ApiFilter
        - id: oauth-service
          uri: ${ROUTE_OAUTH_URI}
          predicates:
            - Path=/oauth/**
          filters:
            - RewritePath=/oauth/?(?<segment>.*), /${segment}
            - ApiFilter
        - id: openapi
          uri: ${ROUTE_API_URI}
          predicates:
            - Path=/v3/api-docs/**
          filters:
            - RewritePath=/v3/api-docs/?(?<segment>.*), /${segment}/v3/api-docs

management:
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: gateway
  tracing:
    enabled: false
    sampling:
      probability: 1.0

springdoc:
  swagger-ui:
    use-root-path: true
    path: /docs
    operationsSorter: method

logging.level.org.springframework: INFO