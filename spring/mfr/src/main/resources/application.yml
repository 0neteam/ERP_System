#서비스의 포트 설정
server.port: 8002

spring:
  #서비스의 이름 설정
  application.name: mfr
  #env파일 설정
  config:
    import: optional:file:.env[.properties]
  #데이터베이스 연결 설정
  datasource:
    driver-class-name: ${DB_DRIVER}
    url: ${DB_JDBC}
    username: ${DB_USER}
    password: ${DB_PWD}
  #JPA설정
  jpa:
    hibernate.ddl-auto: none
    properties.hibernate:
      show_sql: true
      format_sql: true
    hibernate:
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
#액추에이터  설정
management:
  info:
    git:
      mode: full
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: false
    sampling:
      probability: 1.0
#스웨거 설정
springdoc:
  swagger-ui:
    path: /docs
    operationsSorter: method

swagger:
  api-gateway-url: ${SWAGGER_URL}/${spring.application.name}

logging.level.org:
  springframework.security: trace
  hibernate.sql: debug
#  jwt 키 설정
jwt:
  keys-uri: ${JWT_KEY_URL}
file.upload.path: ${FILE_UPLOAD_PATH}