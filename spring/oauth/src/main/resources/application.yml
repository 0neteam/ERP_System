#서버의 포트설정, 세션타임 설정
server:
  port: 9000
  servlet:
    session:
      timeout: 24h

spring:
  #서버의 이름 설정
  application.name: oauth
  #env파일 설정
  config:
    import: optional:file:.env[.properties]
  #데이터베이스 연결 설정
  datasource:
    driver-class-name: ${DB_DRIVER}
    url: ${DB_JDBC}
    username: ${DB_USER}
    password: ${DB_PWD}
  #JPA설정
  jpa:
    hibernate.ddl-auto: none
    properties.hibernate:
      show_sql: true
      format_sql: true
    hibernate:
      naming:
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  #파일 업로드 설정
  servlet:
    multipart:
      maxFileSize: 100MB
      maxRequestSize: 100MB
  #이메일 설정
  mail:
    host: ${EMAIL_HOST}
    port: ${EMAIL_PORT}
    username: ${EMAIL_USERNAME}
    password: ${EMAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: ${EMAIL_SMTP_AUTH}
          timeout: ${EMAIL_SMTP_TIMEOUT}
          starttls:
            enable: ${EMAIL_SMTP_ENABLE}
#액추에이터  설정
management:
  info:
    git:
      mode: full
  endpoints:
    web:
      exposure:
        include: "*"
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    enabled: false
    sampling:
      probability: 1.0
#스웨거 설정
springdoc:
  swagger-ui:
    path: /docs
    operationsSorter: method

swagger:
  api-gateway-url: ${SWAGGER_URL}/${spring.application.name}

logging.level.org:
  springframework.security: trace
  hibernate.sql: debug
#RSA키 설정
rsa:
  public-key: ${RSA_PUBLIC_KEY}
  private-key: ${RSA_PRIVATE_KEY}

logout.redirect-url: ${SWAGGER_URL}
file.upload.path: ${FILE_UPLOAD_PATH}